# Prometheus — scrape do OTel collector + alerts.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: g4os-dev

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # App Electron — prom-client exposto via metrics-scrape-server.ts na porta 9464.
  # `host.docker.internal` resolve para o host no Docker Desktop (macOS/Windows).
  # Em Linux: adicionar `extra_hosts: host.docker.internal:host-gateway` no compose.
  - job_name: g4os-app
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: g4os-desktop
