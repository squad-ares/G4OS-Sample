name: Memlab nightly
# TASK-17-11: gate de memória rodando madrugada. Falhas abrem issue
# automática (não bloqueiam PR). Threshold conservador (5MB delta após
# 30 ciclos) — ajustar com baseline real após primeiras runs.

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC todos os dias
  workflow_dispatch: {}   # permite trigger manual via UI

permissions:
  contents: read
  issues: write   # criar issue em falha

jobs:
  hud-leak:
    name: Debug HUD heap leak
    if: false # workflow desabilitado temporariamente
    runs-on: macos-14
    timeout-minutes: 20
    env:
      G4OS_E2E_MEMLAB: '1'
      G4OS_E2E: '1'  # ativa mockAuthMode no auth-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @g4os/desktop build
      - name: Install playwright browsers
        run: pnpm --filter @g4os/desktop-e2e exec playwright install --with-deps chromium
      - name: Run memlab gate
        run: pnpm --filter @g4os/desktop-e2e exec playwright test memory-cycle
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memlab-results
          path: apps/desktop-e2e/test-results/
          retention-days: 14
      - name: Open issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[memlab] Debug HUD heap regression on ${sha}`,
              body: [
                `Memlab nightly detectou regressão de heap em \`${sha}\`.`,
                ``,
                `Baixe \`memlab-results\` artifact para os detalhes.`,
                ``,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['memlab', 'leak', 'auto-generated'],
            });
