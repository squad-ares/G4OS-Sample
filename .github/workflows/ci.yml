name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # Job 1: Setup e install
  setup:
    name: Setup dependencies
    runs-on: ubuntu-latest
    outputs:
      pnpm-store-path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

  # Job 2: Lint + Format check
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # Job 3: Typecheck
  typecheck:
    name: Type check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Job 4: Architecture gates
  architecture:
    name: Architecture gates
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Check max file lines
        run: pnpm check:file-lines

      - name: Check main process size budget
        run: pnpm check:main-size

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Check layer boundaries
        run: pnpm check:cruiser

      - name: Check dead code
        run: pnpm check:dead-code

      - name: Check unused dependencies
        run: pnpm check:unused-deps

      - name: Check package exports
        run: pnpm check:exports

  # Job 5: Unit tests (Ubuntu apenas — economiza cota em repo privado).
  # Cross-OS smoke roda em release-desktop.yml antes de publicar.
  test:
    name: Test (ubuntu-latest)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu-latest
          path: coverage/

  # Job 6: Build (Ubuntu apenas — economiza cota macOS 10x em repo privado).
  # Build completo multi-plataforma roda em release-desktop.yml (workflow_dispatch).
  build:
    name: Build (ubuntu-latest)
    needs: [lint, typecheck, architecture]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # Job 7: Commit convention (apenas em PRs)
  commits:
    name: Commit convention
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm commitlint --from=origin/main --to=HEAD --verbose

  # Job 8: Changeset check (obriga changeset em mudanças de pacote)
  changeset:
    name: Changeset required
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm changeset status --since=origin/main

  # Job 9: Bundle size
  bundle-size:
    name: Bundle size check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:size

  # Gate final: todos os checks obrigatórios
  all-checks:
    name: All checks passed
    needs: [lint, typecheck, architecture, test, build, commits, changeset, bundle-size]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any check failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1